<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://unpkg.com https://cdn.jsdelivr.net https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://router.huggingface.co https://integrate.api.nvidia.com https://corsproxy.io https://www.gstatic.com https://unpkg.com https://cdn.jsdelivr.net; img-src 'self' data: https://*.googleusercontent.com; frame-src https://accounts.google.com https://spendwise-app-f7227.firebaseapp.com; frame-ancestors 'none';">
  <title>SpendWise - AI Insights</title>
  <link rel="icon" type="image/png" href="assets/images/logo2.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#121212">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/images/logo2.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body>

  <!-- Full-page loader -->
  <div id="page-loader" class="page-loader">
    <div class="coin-scene">
      <div class="coin">
        <div class="coin-face coin-front">
          <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="coinGrad" cx="40%" cy="35%" r="60%">
                <stop offset="0%" stop-color="#FFE066"/>
                <stop offset="50%" stop-color="#FFD700"/>
                <stop offset="100%" stop-color="#B8860B"/>
              </radialGradient>
            </defs>
            <circle cx="60" cy="60" r="58" fill="url(#coinGrad)" stroke="#B8860B" stroke-width="2"/>
            <circle cx="60" cy="60" r="50" fill="none" stroke="#DAA520" stroke-width="1.5" stroke-dasharray="4 3"/>
            <text x="60" y="72" text-anchor="middle" font-size="42" font-weight="700" fill="#8B6914" font-family="Inter, sans-serif">₹</text>
          </svg>
        </div>
        <div class="coin-face coin-back">
          <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="coinGradBack" cx="60%" cy="35%" r="60%">
                <stop offset="0%" stop-color="#FFE066"/>
                <stop offset="50%" stop-color="#FFD700"/>
                <stop offset="100%" stop-color="#B8860B"/>
              </radialGradient>
            </defs>
            <circle cx="60" cy="60" r="58" fill="url(#coinGradBack)" stroke="#B8860B" stroke-width="2"/>
            <circle cx="60" cy="60" r="50" fill="none" stroke="#DAA520" stroke-width="1.5" stroke-dasharray="4 3"/>
            <circle cx="60" cy="60" r="22" fill="none" stroke="#8B6914" stroke-width="2"/>
            <text x="60" y="66" text-anchor="middle" font-size="20" font-weight="700" fill="#8B6914" font-family="Inter, sans-serif">SW</text>
          </svg>
        </div>
      </div>
    </div>
    <span class="page-loader-text">Loading SpendWise…</span>
  </div>

  <div id="auth-screen" class="auth-screen hidden">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="assets/images/logo.png" alt="SpendWise Logo" class="auth-logo-image">
        <p>Track every rupee, effortlessly.</p>
      </div>
      <div class="tab-switcher">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
      </div>
      <div id="login-form" class="auth-form">
        <div class="form-group">
          <label>Email</label>
          <div class="input-icon-wrap"><i data-lucide="mail"></i>
            <input type="email" id="login-email" placeholder="you@example.com" />
          </div>
        </div>
        <div class="form-group">
          <div class="password-label-row">
            <label>Password</label>
            <button type="button" class="btn-forgot" onclick="showForgotPassword()">Forgot password?</button>
          </div>
          <div class="input-icon-wrap"><i data-lucide="lock"></i>
            <input type="password" id="login-password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" />
          </div>
        </div>
        <button class="btn-primary" onclick="handleLogin()">Login</button>
        <div class="divider"><span>or</span></div>
        <button class="btn-google" onclick="handleGoogleLogin()">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
            <path fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
            <path fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
            <path fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
          </svg>
          Continue with Google
        </button>
      </div>
      <div id="signup-form" class="auth-form hidden">
        <div class="form-group">
          <label>Full Name</label>
          <div class="input-icon-wrap"><i data-lucide="user"></i>
            <input type="text" id="signup-name" placeholder="Your Name" />
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <div class="input-icon-wrap"><i data-lucide="mail"></i>
            <input type="email" id="signup-email" placeholder="you@example.com" />
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-icon-wrap"><i data-lucide="lock"></i>
            <input type="password" id="signup-password"
              placeholder="Min 8 characters, 1 uppercase, 1 lowercase, 1 number, 1 special character" />
          </div>
        </div>
        <button class="btn-primary" onclick="handleSignup()">Create Account</button>
        <div class="divider"><span>or</span></div>
        <button class="btn-google" onclick="handleGoogleLogin()">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
            <path fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
            <path fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
            <path fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
          </svg>
          Continue with Google
        </button>
      </div>
      <div id="auth-error" class="auth-error hidden"></div>
    </div>
  </div>

  <div id="app" class="app hidden">
    <nav class="navbar">
      <div class="nav-left">
        <img src="assets/images/logo.png" alt="SpendWise Logo" class="nav-logo-image">
      </div>
      <div class="nav-right">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme" id="theme-btn">
          <i id="theme-icon" data-lucide="sun"></i>
        </button>
        <div class="profile-menu" id="profile-menu">
          <div class="user-avatar" id="user-avatar">U</div>
          <div class="profile-dropdown hidden" id="profile-dropdown">
            <div class="profile-currency-wrap">
              <label for="currency-select">Currency</label>
              <select id="currency-select" onchange="handleCurrencyChange(this.value)"></select>
            </div>
            <button class="btn-logout profile-logout-btn" onclick="handleLogout()" title="Logout">
              <i data-lucide="log-out"></i><span>Logout</span>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Bottom nav (mobile) -->
    <div class="bottom-nav">
      <button class="bottom-nav-btn" onclick="window.location.href='index.html'" id="bnav-dashboard">
        <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
      </button>
      <button class="bottom-nav-btn" onclick="window.location.href='expense.html'" id="bnav-add">
        <i data-lucide="wallet"></i><span>Expense</span>
      </button>
      <button class="bottom-nav-btn" onclick="window.location.href='income.html'" id="bnav-income">
        <i data-lucide="trending-up"></i><span>Income</span>
      </button>
      <button class="bottom-nav-btn" onclick="window.location.href='history.html'" id="bnav-history">
        <i data-lucide="history"></i><span>History</span>
      </button>
      <button class="bottom-nav-btn active" id="bnav-insights">
        <i data-lucide="sparkles"></i><span>AI</span>
      </button>
    </div>

    <!-- Sidebar (desktop) -->
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <button class="sidebar-btn" onclick="window.location.href='index.html'" id="snav-dashboard">
          <i data-lucide="layout-dashboard"></i> Dashboard
        </button>
        <button class="sidebar-btn" onclick="window.location.href='expense.html'" id="snav-add">
          <i data-lucide="wallet"></i> Expense
        </button>
        <button class="sidebar-btn" onclick="window.location.href='income.html'" id="snav-income">
          <i data-lucide="trending-up"></i> Income
        </button>
        <button class="sidebar-btn" onclick="window.location.href='history.html'" id="snav-history">
          <i data-lucide="history"></i> History
        </button>
        <button class="sidebar-btn active" id="snav-insights">
          <i data-lucide="sparkles"></i> AI Insights
        </button>
      </nav>
    </aside>

    <main class="main-content">
      <!-- ═══ AI INSIGHTS PAGE ═══ -->
      <div class="insights-hero">
        <div class="insights-hero-glow"></div>
        <div class="insights-hero-content">
          <div class="insights-hero-icon">
            <i data-lucide="brain"></i>
          </div>
          <div>
            <h2>AI Insights</h2>
            <p>Smart analysis of your spending patterns</p>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <div class="insights-controls">
        <div class="insights-period-selects">
          <div class="insights-select-wrap">
            <i data-lucide="calendar"></i>
            <select id="insights-month"></select>
          </div>
          <div class="insights-select-wrap">
            <i data-lucide="calendar-range"></i>
            <select id="insights-year"></select>
          </div>
        </div>
        <div class="insights-action-btns">
          <button class="insights-analyze-btn" id="insights-analyze-btn">
            <i data-lucide="sparkles"></i>
            <span>Analyze My Spending</span>
          </button>
          <button class="insights-refresh-btn" id="insights-refresh-btn" title="Refresh (bypass cache)">
            <i data-lucide="refresh-cw"></i>
          </button>
        </div>
        <span id="insights-cached-badge" class="insights-cached-badge hidden">
          <i data-lucide="database"></i> Cached result
        </span>
      </div>

      <!-- Error state -->
      <div id="insights-error" class="insights-error-card hidden">
        <div class="insights-error-icon"><i data-lucide="alert-circle"></i></div>
        <p class="insights-error-text">An error occurred.</p>
        <button class="btn-secondary" onclick="document.getElementById('insights-error').classList.add('hidden')">Dismiss</button>
      </div>

      <!-- Empty state -->
      <div id="insights-empty" class="insights-empty-state">
        <div class="insights-empty-illustration">
          <div class="empty-orb">
            <i data-lucide="brain"></i>
          </div>
          <div class="empty-sparkles">
            <span></span><span></span><span></span>
          </div>
        </div>
        <h3>Ready to Analyze</h3>
        <p>Select a month and tap <strong>"Analyze My Spending"</strong> to get AI-powered insights about your financial habits.</p>
      </div>

      <!-- Results container (populated by ai-insights.js) -->
      <div id="insights-results" class="insights-results hidden"></div>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="assets/js/utils/currency.js"></script>
  <script type="module" src="assets/js/dashboard.js"></script>
  <script type="module" src="assets/js/modules/insights.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
    });
  </script>
</body>

</html>
