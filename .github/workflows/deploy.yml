# Deploy SpendWise to GitHub Pages
# Injects the HF_TOKEN secret at build time (replacing the placeholder in voice-command.js)
name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:          # allow manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject HF Token
        env:
          HF_TOKEN_VALUE: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN_VALUE" ]; then
            echo "::warning::HF_TOKEN secret is not set!"
          else
            sed -i "s|__HF_TOKEN_PLACEHOLDER__|${HF_TOKEN_VALUE}|g" assets/js/modules/voice-command.js
            sed -i "s|__HF_TOKEN_PLACEHOLDER__|${HF_TOKEN_VALUE}|g" assets/js/modules/insights.js
            sed -i "s|__HF_TOKEN_PLACEHOLDER__|${HF_TOKEN_VALUE}|g" assets/js/modules/csv-upload.js
            echo "Token injected successfully (length: ${#HF_TOKEN_VALUE})"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
